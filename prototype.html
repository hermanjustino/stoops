<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Stoops — NYC Discovery Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F5F5F7;
  --glass: rgba(255,255,255,0.82);
  --glass-border: rgba(255,255,255,0.45);
  --text: #1D1D1F;
  --text-sec: #86868B;
  --accent: #0071E3;
  --purple: #8B5CF6;
  --amber: #F59E0B;
  --blue: #3B82F6;
  --rose: #F43F5E;
  --green: #22C55E;
  --red: #EF4444;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 8px 32px rgba(0,0,0,0.12);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.08);
  --font: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
}

html, body {
  height: 100%; width: 100%; overflow: hidden;
  font-family: var(--font); color: var(--text);
  -webkit-font-smoothing: antialiased;
}

#map { position: absolute; inset: 0; z-index: 1; }

/* ── Glass Utility ── */
.glass {
  background: var(--glass);
  backdrop-filter: saturate(180%) blur(24px);
  -webkit-backdrop-filter: saturate(180%) blur(24px);
  border: 1px solid var(--glass-border);
}

/* ── Search Bar ── */
#search-container {
  position: fixed; top: 16px; left: 16px; right: 16px;
  z-index: 1000; display: flex; flex-direction: column; gap: 10px;
  pointer-events: none;
}
#search-bar {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; border-radius: var(--radius);
  box-shadow: var(--shadow); pointer-events: auto;
}
#search-bar svg { flex-shrink: 0; color: var(--text-sec); }
#search-input {
  flex: 1; border: none; background: none; outline: none;
  font-family: var(--font); font-size: 16px; color: var(--text);
}
#search-input::placeholder { color: var(--text-sec); }

/* ── Category Chips ── */
#chips-row {
  display: flex; gap: 8px; overflow-x: auto; padding: 2px 0;
  -ms-overflow-style: none; scrollbar-width: none; pointer-events: auto;
}
#chips-row::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0; padding: 8px 16px; border-radius: 980px;
  font-size: 13px; font-weight: 500; cursor: pointer;
  border: none; box-shadow: var(--shadow-sm);
  transition: all 0.2s ease; pointer-events: auto;
  white-space: nowrap;
}
.chip:hover { transform: translateY(-1px); }
.chip.active { background: var(--text) !important; color: white !important; border-color: transparent !important; }

/* ── Map Controls (right side) ── */
#map-controls {
  position: fixed; right: 16px; top: 50%; transform: translateY(-50%);
  z-index: 1000; display: flex; flex-direction: column; gap: 10px;
}
.map-btn {
  width: 48px; height: 48px; border-radius: 50%; border: none;
  box-shadow: var(--shadow); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s ease; font-size: 20px;
}
.map-btn:hover { transform: scale(1.08); }
.map-btn.active { background: var(--text); color: white; border-color: transparent; }

/* ── Bottom Sheet ── */
#bottom-sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 1001; border-radius: 20px 20px 0 0;
  box-shadow: 0 -4px 32px rgba(0,0,0,0.12);
  transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  max-height: 75vh; display: flex; flex-direction: column;
}
#sheet-handle {
  padding: 12px 0 8px; text-align: center; cursor: grab;
  flex-shrink: 0; user-select: none;
}
#sheet-handle .bar {
  width: 40px; height: 5px; background: #D1D5DB; border-radius: 999px;
  margin: 0 auto 8px;
}
#sheet-handle .count {
  font-size: 14px; font-weight: 500; color: var(--text-sec);
}
#sheet-list {
  flex: 1; overflow-y: auto; padding: 0 16px 24px;
  -ms-overflow-style: none; scrollbar-width: thin;
}
#sheet-sort {
  display: flex; gap: 8px; padding: 0 16px 12px; flex-shrink: 0;
}
.sort-btn {
  padding: 6px 12px; border-radius: 980px; border: 1px solid #E5E7EB;
  background: white; font-size: 12px; font-weight: 500; cursor: pointer;
  font-family: var(--font); transition: all 0.15s;
}
.sort-btn.active { background: var(--text); color: white; border-color: transparent; }

/* ── Bottom Sheet Cards ── */
.sheet-card {
  display: flex; gap: 12px; padding: 14px; margin-bottom: 10px;
  border-radius: var(--radius-sm); cursor: pointer;
  transition: all 0.2s ease; border-left: 4px solid transparent;
  background: rgba(255,255,255,0.6);
}
.sheet-card:hover { background: rgba(255,255,255,0.95); transform: translateX(2px); }
.sheet-card .thumb {
  width: 72px; height: 72px; border-radius: 10px; flex-shrink: 0;
  object-fit: cover; background: #E5E7EB;
}
.sheet-card .info { flex: 1; min-width: 0; }
.sheet-card .title { font-size: 14px; font-weight: 600; margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sheet-card .meta { font-size: 12px; color: var(--text-sec); line-height: 1.5; }
.sheet-card .badge {
  display: inline-block; padding: 2px 8px; border-radius: 980px;
  font-size: 11px; font-weight: 600; margin-top: 4px; color: white;
}

/* ── Detail Panel ── */
#detail-panel {
  position: fixed; bottom: 0; left: 0; right: 0;
  z-index: 1002; border-radius: 20px 20px 0 0;
  box-shadow: 0 -8px 40px rgba(0,0,0,0.18);
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  max-height: 70vh; display: flex; flex-direction: column;
  overflow: hidden;
}
#detail-panel.open { transform: translateY(0); }
#detail-hero {
  width: 100%; height: 200px; object-fit: cover; flex-shrink: 0;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}
#detail-close {
  position: absolute; top: 12px; right: 12px;
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: rgba(0,0,0,0.5); color: white; font-size: 18px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(10px); z-index: 2;
}
#detail-body {
  padding: 20px; flex: 1; overflow-y: auto;
}
#detail-body h2 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
.detail-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 14px; color: var(--text-sec); margin-bottom: 6px;
}
.detail-row svg { flex-shrink: 0; }
#detail-desc { font-size: 14px; line-height: 1.6; color: var(--text-sec); margin: 16px 0; }
#detail-actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.action-btn {
  padding: 12px 20px; border-radius: 980px; border: none;
  font-family: var(--font); font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}
.action-btn.primary { background: var(--accent); color: white; }
.action-btn.primary:hover { opacity: 0.9; }
.action-btn.secondary { background: #F3F4F6; color: var(--text); }
.action-btn.secondary:hover { background: #E5E7EB; }

/* ── Detail Badges ── */
.detail-badges { display: flex; gap: 8px; margin: 12px 0; flex-wrap: wrap; }
.detail-badge {
  padding: 4px 12px; border-radius: 980px; font-size: 12px;
  font-weight: 600; color: white;
}

/* ── Similar Events Carousel ── */
#similar-section { margin-top: 24px; padding-top: 20px; border-top: 1px solid #E5E7EB; }
#similar-section h3 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
#similar-scroll {
  display: flex; gap: 12px; overflow-x: auto; padding-bottom: 8px;
  -ms-overflow-style: none; scrollbar-width: none;
}
#similar-scroll::-webkit-scrollbar { display: none; }
.similar-card {
  flex-shrink: 0; width: 200px; border-radius: var(--radius-sm);
  overflow: hidden; cursor: pointer; background: white;
  box-shadow: var(--shadow-sm); transition: transform 0.2s;
}
.similar-card:hover { transform: translateY(-2px); }
.similar-card .sim-img {
  width: 100%; height: 100px; object-fit: cover;
  background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
}
.similar-card .sim-info { padding: 10px; }
.similar-card .sim-title { font-size: 13px; font-weight: 600; margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.similar-card .sim-meta { font-size: 11px; color: var(--text-sec); }

/* ── Neighborhood Info Popup ── */
.neighborhood-popup { min-width: 240px; }
.neighborhood-popup h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.neighborhood-popup .vibes { display: flex; gap: 4px; flex-wrap: wrap; margin: 8px 0; }
.neighborhood-popup .vibe {
  padding: 2px 8px; border-radius: 980px; font-size: 11px;
  font-weight: 500; background: #EDE9FE; color: #7C3AED;
}
.neighborhood-popup .n-desc { font-size: 13px; color: var(--text-sec); line-height: 1.4; margin: 8px 0; }
.neighborhood-popup .n-rating { font-size: 13px; color: var(--amber); }
.neighborhood-popup .n-events { font-size: 12px; color: var(--accent); font-weight: 500; cursor: pointer; margin-top: 6px; }

/* ── Pulse animation for Happening Now ── */
@keyframes pulse-pin {
  0% { box-shadow: 0 0 0 0 rgba(139,92,246,0.5); }
  70% { box-shadow: 0 0 0 12px rgba(139,92,246,0); }
  100% { box-shadow: 0 0 0 0 rgba(139,92,246,0); }
}
.pulse-marker { animation: pulse-pin 1.5s infinite; }

/* ── Custom Leaflet pin markers ── */
.custom-pin {
  width: 32px; height: 32px; border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  border: 2.5px solid white;
  transition: transform 0.2s;
}
.custom-pin:hover { transform: rotate(-45deg) scale(1.15); }
.custom-pin .pin-icon {
  transform: rotate(45deg); font-size: 14px; line-height: 1;
}
.pin-event { background: var(--purple); }
.pin-attraction { background: var(--amber); }
.pin-landmark { background: var(--blue); }
.pin-bathroom { background: var(--rose); }

/* ── Cluster override ── */
.marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
  background: rgba(139,92,246,0.25) !important;
}
.marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
  background: var(--purple) !important; color: white !important;
  font-family: var(--font) !important; font-weight: 600 !important;
}

/* ── Search Overlay ── */
#search-overlay {
  position: fixed; inset: 0; z-index: 1003;
  background: rgba(245,245,247,0.96);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  padding: 80px 20px 20px;
  transform: translateY(-100%); opacity: 0;
  transition: all 0.3s ease;
  overflow-y: auto;
}
#search-overlay.open { transform: translateY(0); opacity: 1; }
#search-overlay h4 { font-size: 13px; font-weight: 600; color: var(--text-sec);
  text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 10px; }
.search-result {
  display: flex; align-items: center; gap: 12px;
  padding: 12px; border-radius: var(--radius-sm); cursor: pointer;
  transition: background 0.15s;
}
.search-result:hover { background: rgba(0,0,0,0.04); }
.search-result .sr-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.search-result .sr-title { font-size: 15px; font-weight: 500; }
.search-result .sr-sub { font-size: 12px; color: var(--text-sec); }

/* ── Saved Overlay ── */
#saved-overlay {
  position: fixed; inset: 0; z-index: 1003;
  background: rgba(245,245,247,0.97);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  transform: translateX(100%); opacity: 0;
  transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  display: flex; flex-direction: column;
}
#saved-overlay.open { transform: translateX(0); opacity: 1; }
#saved-header {
  padding: 20px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid #E5E7EB;
}
#saved-header h2 { font-size: 20px; font-weight: 700; }
#saved-close { background: none; border: none; font-size: 24px; cursor: pointer; padding: 4px; color: var(--text-sec); }
#saved-list { flex: 1; overflow-y: auto; padding: 16px; }
.saved-empty { text-align: center; padding: 60px 20px; color: var(--text-sec); }
#saved-show-map {
  margin: 16px; padding: 14px; border-radius: var(--radius); border: none;
  background: var(--accent); color: white; font-family: var(--font);
  font-size: 15px; font-weight: 600; cursor: pointer; text-align: center;
}

/* ── Leaflet overrides ── */
.leaflet-control-attribution { font-size: 10px !important; opacity: 0.6; }
.leaflet-popup-content-wrapper { border-radius: var(--radius-sm) !important; box-shadow: var(--shadow) !important; }
.leaflet-popup-content { margin: 12px 16px !important; font-family: var(--font) !important; }

/* ── Happening Now indicator ── */
#happening-indicator {
  position: fixed; top: 110px; left: 50%; transform: translateX(-50%);
  z-index: 1000; padding: 8px 20px; border-radius: 980px;
  font-size: 13px; font-weight: 600; color: white;
  background: linear-gradient(135deg, var(--purple), #EC4899);
  box-shadow: var(--shadow);
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
#happening-indicator.show { opacity: 1; }
</style>
</head>
<body>

<!-- Map -->
<div id="map"></div>

<!-- Search Container -->
<div id="search-container">
  <div id="search-bar" class="glass">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="search-input" type="text" placeholder="Search NYC events, places, neighborhoods..." autocomplete="off">
    <button id="saved-btn" style="background:none;border:none;cursor:pointer;padding:4px;" title="Saved items">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
    </button>

  <div id="chips-row">

    <button class="chip glass" data-cat="Art & Culture">Art & Culture</button>

    <button class="chip glass" data-cat="Nightlife">Nightlife</button>
    <button class="chip glass" data-cat="Sports">Sports</button>
    <button class="chip glass" data-cat="Community">Community</button>
    <button class="chip glass" data-cat="Family">Family</button>
    <button class="chip glass" data-cat="Free">Free</button>
    <button class="chip glass" data-cat="attraction">Attractions</button>
    <button class="chip glass" data-cat="landmark">Landmarks</button>
    <button class="chip glass" data-cat="neighborhood">Neighborhoods</button>
    <button class="chip glass" data-cat="bathroom">Bathrooms</button>
  </div>
</div>

<!-- Map Controls -->
<div id="map-controls">
  <button class="map-btn glass" id="btn-happening" title="Happening Now">&#9889;</button>
  <button class="map-btn glass" id="btn-foryou" title="For You">&#10024;</button>

</div>

<!-- Happening Now Indicator -->
<div id="happening-indicator">&#9889; Happening Now</div>

<!-- Bottom Sheet -->
<div id="bottom-sheet" class="glass">
  <div id="sheet-handle">
    <div class="bar"></div>
    <div class="count" id="sheet-count">24 things nearby</div>
  </div>
  <div id="sheet-sort">
    <button class="sort-btn active" data-sort="nearest">Nearest</button>
    <button class="sort-btn" data-sort="soonest">Soonest</button>
    <button class="sort-btn" data-sort="popular">Popular</button>
    <button class="sort-btn" data-sort="foryou">For You</button>
  </div>
  <div id="sheet-list"></div>
</div>

<!-- Detail Panel -->
<div id="detail-panel" class="glass">
  <div id="detail-hero" style="position:relative;">
    <button id="detail-close">&times;</button>
  </div>
  <div id="detail-body">
    <h2 id="detail-title"></h2>
    <div class="detail-badges" id="detail-badges"></div>
    <div class="detail-row" id="detail-time">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span></span>
    </div>
    <div class="detail-row" id="detail-venue">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      <span></span>
    </div>
    <div class="detail-row" id="detail-price">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      <span></span>
    </div>
    <p id="detail-desc"></p>
    <div id="detail-actions">
      <button class="action-btn primary" id="btn-tickets">Get Tickets</button>
      <button class="action-btn secondary" id="btn-save">&#9829; Save</button>
      <button class="action-btn secondary" id="btn-share">Share</button>
      <button class="action-btn secondary" id="btn-remind">Remind Me</button>
    </div>
    <div id="similar-section">
      <h3>Similar nearby</h3>
      <div id="similar-scroll"></div>
    </div>
  </div>
</div>

<!-- Search Overlay -->
<div id="search-overlay">
  <h4>Trending Now</h4>
  <div id="trending-results"></div>
  <h4>Categories</h4>
  <div id="search-cats" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;"></div>
  <h4 id="search-results-label" style="display:none;">Results</h4>
  <div id="search-results"></div>
</div>

<!-- Saved Overlay -->
<div id="saved-overlay">
  <div id="saved-header">
    <h2>Saved</h2>
    <button id="saved-close">&times;</button>
  </div>
  <div id="saved-list">
    <div class="saved-empty">
      <p style="font-size:40px;margin-bottom:12px;">&#128278;</p>
      <p style="font-size:16px;font-weight:500;color:var(--text);margin-bottom:4px;">No saved items yet</p>
      <p style="font-size:14px;">Tap the heart on any event to save it here.</p>
    </div>
  </div>
  <button id="saved-show-map">Show All on Map</button>
</div>

// MAP SETUP

const map = L.map('map', {

  attributionControl: true

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {

  subdomains: 'abcd', maxZoom: 19

// ─────────────────────────────────────────────
// MARKERS
// ─────────────────────────────────────────────
const clusterGroup = L.markerClusterGroup({
  maxClusterRadius: 50,
  spiderfyOnMaxZoom: true,
  showCoverageOnHover: false,
  zoomToBoundsOnClick: true,
  disableClusteringAtZoom: 16
});

const markerMap = {};    // id -> L.marker
let activeCategory = 'all';
let happeningNow = false;
let savedItems = new Set();

function pinIcon(item) {
  const cls = item.type === 'event' ? 'pin-event' :
              item.type === 'attraction' ? 'pin-attraction' :
              item.type === 'landmark' ? 'pin-landmark' : 'pin-bathroom';
  const emoji = item.type === 'event' ? (
    item.category === 'Music' ? '&#9835;' :
    item.category === 'Comedy' ? '&#128514;' :
    item.category === 'Food & Drink' ? '&#127837;' :
    item.category === 'Art & Culture' ? '&#127912;' :
    item.category === 'Sports' ? '&#9917;' :
    item.category === 'Nightlife' ? '&#127769;' :
    item.category === 'Community' ? '&#129309;' :
    item.category === 'Family' ? '&#128106;' : '&#127881;'
  ) : item.type === 'attraction' ? '&#11088;' :
      item.type === 'landmark' ? '&#127963;' : '&#128701;';

  const pulse = happeningNow && item.happeningNow ? ' pulse-marker' : '';
  return L.divIcon({
    className: '',
    html: `<div class="custom-pin ${cls}${pulse}"><span class="pin-icon">${emoji}</span></div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 32],
    popupAnchor: [0, -34]
  });
}

function addMarkers() {
  clusterGroup.clearLayers();
  Object.keys(markerMap).forEach(k => delete markerMap[k]);

  ALL_ITEMS.forEach(item => {
    // Filter logic
    if (activeCategory !== 'all') {
      if (['attraction','landmark','bathroom'].includes(activeCategory)) {
        if (item.type !== activeCategory) return;
      } else if (activeCategory === 'Free') {
        if (item.priceType !== 'Free' && item.price !== 'Free') return;
      } else if (activeCategory === 'neighborhood') {
        return; // neighborhoods shown as overlays
      } else {
        if (item.category !== activeCategory) return;
      }
    }
    if (happeningNow && item.type === 'event' && !item.happeningNow) return;
    if (happeningNow && item.type === 'bathroom') return;

    const marker = L.marker([item.lat, item.lng], { icon: pinIcon(item) });
    marker.on('click', () => openDetail(item));
    markerMap[item.id] = marker;
    clusterGroup.addLayer(marker);
  });

  map.addLayer(clusterGroup);
  updateBottomSheet();
}

let neighborhoodLayers = [];

function showNeighborhoods() {
  hideNeighborhoods();
  NEIGHBORHOODS.forEach(n => {
    const polygon = L.polygon(n.bounds, {
      color: '#8B5CF6', weight: 2, opacity: 0.6,
      fillColor: '#8B5CF6', fillOpacity: 0.1
    });
    const vibeHtml = n.vibes.map(v => `<span class="vibe">${v}</span>`).join('');
    const eventsInNeighborhood = EVENTS.filter(e => e.neighborhood === n.name).length;
    polygon.bindPopup(`
      <div class="neighborhood-popup">
        <h3>${n.name}</h3>
        <div class="n-rating">${'&#9733;'.repeat(Math.round(n.rating))} ${n.rating}</div>
        <div class="vibes">${vibeHtml}</div>
        <p class="n-desc">${n.desc}</p>
        <div class="n-events">${eventsInNeighborhood} events happening here &rarr;</div>
      </div>
    `, { maxWidth: 280 });
    polygon.addTo(map);
    neighborhoodLayers.push(polygon);
  });
}

function hideNeighborhoods() {
  neighborhoodLayers.forEach(l => map.removeLayer(l));
  neighborhoodLayers = [];
}

// ─────────────────────────────────────────────
// BOTTOM SHEET
// ─────────────────────────────────────────────
const sheet = document.getElementById('bottom-sheet');
const sheetHandle = document.getElementById('sheet-handle');
let sheetExpanded = false;
const SHEET_COLLAPSED = 130;
const SHEET_EXPANDED_RATIO = 0.6;

function setSheetPosition(expanded) {
  sheetExpanded = expanded;
  if (expanded) {
    sheet.style.transform = `translateY(0)`;
    sheet.style.maxHeight = `${window.innerHeight * SHEET_EXPANDED_RATIO}px`;
  } else {
    sheet.style.transform = `translateY(calc(100% - ${SHEET_COLLAPSED}px))`;
  }
}
setSheetPosition(false);

sheetHandle.addEventListener('click', () => setSheetPosition(!sheetExpanded));

// Drag behavior
let startY = 0, startTransform = 0, dragging = false;
sheetHandle.addEventListener('touchstart', e => {
  dragging = true; startY = e.touches[0].clientY;
}, { passive: true });
sheetHandle.addEventListener('touchmove', e => {
  if (!dragging) return;
  const dy = e.touches[0].clientY - startY;
  if (sheetExpanded && dy > 0) {
    sheet.style.transition = 'none';
    sheet.style.transform = `translateY(${dy}px)`;
  } else if (!sheetExpanded && dy < 0) {
    sheet.style.transition = 'none';
    const base = sheet.getBoundingClientRect().height - SHEET_COLLAPSED;
    sheet.style.transform = `translateY(calc(100% - ${SHEET_COLLAPSED - dy}px))`;
  }
}, { passive: true });
sheetHandle.addEventListener('touchend', e => {
  dragging = false;
  sheet.style.transition = '';
  const rect = sheet.getBoundingClientRect();
  if (rect.top < window.innerHeight * 0.5) {
    setSheetPosition(true);
  } else {
    setSheetPosition(false);
  }
});

function colorForType(type) {
  return type === 'event' ? 'var(--purple)' : type === 'attraction' ? 'var(--amber)' :
         type === 'landmark' ? 'var(--blue)' : 'var(--rose)';
}

function updateBottomSheet() {
  const bounds = map.getBounds();
  const visible = ALL_ITEMS.filter(item => {
    if (!bounds.contains([item.lat, item.lng])) return false;
    if (activeCategory !== 'all') {
      if (['attraction','landmark','bathroom'].includes(activeCategory)) {
        if (item.type !== activeCategory) return false;
      } else if (activeCategory === 'Free') {
        if (item.priceType !== 'Free' && item.price !== 'Free') return false;
      } else if (activeCategory === 'neighborhood') {
        return item.type === 'event';
      } else {
        if (item.category !== activeCategory) return false;
      }
    }
    if (happeningNow && item.type === 'event' && !item.happeningNow) return false;
    if (happeningNow && item.type === 'bathroom') return false;
    return true;
  });

  document.getElementById('sheet-count').textContent = `${visible.length} thing${visible.length !== 1 ? 's' : ''} nearby`;

  const list = document.getElementById('sheet-list');
  list.innerHTML = visible.map(item => {
    const badgeLabel = item.type === 'event' ? item.category :
                       item.type.charAt(0).toUpperCase() + item.type.slice(1);
    const timeLine = item.datetime ? new Date(item.datetime).toLocaleString('en-US', { weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }) :
                     item.hours || '';
    return `
      <div class="sheet-card" data-id="${item.id}" style="border-left-color:${colorForType(item.type)}">
        <div class="thumb" style="background:${item.img || colorForType(item.type)};"></div>
        <div class="info">
          <div class="title">${item.title}</div>
          <div class="meta">${timeLine}${item.venue ? ' · ' + item.venue : ''}</div>
          <div class="meta">${item.neighborhood || item.address}${item.price ? ' · ' + item.price : ''}</div>
          <span class="badge" style="background:${colorForType(item.type)}">${badgeLabel}</span>
        </div>
      </div>`;
  }).join('');

  list.querySelectorAll('.sheet-card').forEach(card => {
    card.addEventListener('click', () => {
      const item = ALL_ITEMS.find(i => i.id === card.dataset.id);
      if (item) {
        map.flyTo([item.lat, item.lng], 15, { duration: 0.8 });
        openDetail(item);
      }
    });
  });
}

map.on('moveend', updateBottomSheet);

document.querySelectorAll('.sort-btn').forEach(btn => {

// ─────────────────────────────────────────────
// DETAIL PANEL
// ─────────────────────────────────────────────
const detailPanel = document.getElementById('detail-panel');
let currentDetail = null;

function openDetail(item) {
  currentDetail = item;
  setSheetPosition(false);

  document.getElementById('detail-hero').style.background = item.img || colorForType(item.type);
  document.getElementById('detail-title').textContent = item.title;

  // Badges
  const badgesEl = document.getElementById('detail-badges');
  const badgeLabel = item.type === 'event' ? item.category : item.type.charAt(0).toUpperCase() + item.type.slice(1);
  let badgesHtml = `<span class="detail-badge" style="background:${colorForType(item.type)}">${badgeLabel}</span>`;
  if (item.neighborhood) badgesHtml += `<span class="detail-badge" style="background:#6B7280">${item.neighborhood}</span>`;
  if (item.priceType === 'Free' || item.price === 'Free') badgesHtml += `<span class="detail-badge" style="background:var(--green)">Free</span>`;
  if (item.happeningNow) badgesHtml += `<span class="detail-badge" style="background:var(--rose)">Happening Now</span>`;
  if (item.status) badgesHtml += `<span class="detail-badge" style="background:${item.status==='open'?'var(--green)':'var(--red)'}">` + (item.status==='open'?'Open':'Closed') + `</span>`;
  badgesEl.innerHTML = badgesHtml;

  // Time
  const timeEl = document.getElementById('detail-time');
  if (item.datetime) {
    timeEl.style.display = 'flex';
    timeEl.querySelector('span').textContent = new Date(item.datetime).toLocaleString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' });
  } else if (item.hours) {
    timeEl.style.display = 'flex';
    timeEl.querySelector('span').textContent = item.hours;
  } else {
    timeEl.style.display = 'none';
  }

  // Venue
  const venueEl = document.getElementById('detail-venue');
  venueEl.querySelector('span').textContent = (item.venue ? item.venue + ' · ' : '') + (item.address || '');

  // Price
  const priceEl = document.getElementById('detail-price');
  if (item.price) {
    priceEl.style.display = 'flex';
    priceEl.querySelector('span').textContent = item.price;
  } else {
    priceEl.style.display = 'none';
  }

  // Description
  let descHtml = item.desc || '';
  if (item.rating) {
    descHtml = `<strong>${'&#9733;'.repeat(Math.round(item.rating))} ${item.rating}</strong> (${item.reviews?.toLocaleString() || 0} reviews)<br><br>` + descHtml;
  }
  if (item.tips && item.tips.length) {
    descHtml += '<br><br><strong>Local Tips:</strong><ul style="margin:6px 0 0 18px;">' +
      item.tips.map(t => `<li style="margin-bottom:4px;font-size:13px;">${t}</li>`).join('') + '</ul>';
  }
  if (item.amenities) {
    const icons = { wheelchair: '&#9855; Wheelchair', changing_table: '&#128700; Changing Table', attended: '&#128100; Attended' };
    descHtml += '<br><strong>Amenities:</strong> ' + item.amenities.map(a => icons[a] || a).join(' &middot; ');
  }
  if (item.clean) {
    descHtml += `<br><strong>Cleanliness:</strong> ${'&#9733;'.repeat(Math.round(item.clean))} ${item.clean}/5`;
  }
  document.getElementById('detail-desc').innerHTML = descHtml;

  // Actions
  const ticketsBtn = document.getElementById('btn-tickets');
  ticketsBtn.textContent = item.type === 'event' ? (item.priceType === 'Free' ? 'More Info' : 'Get Tickets') :
                           item.type === 'bathroom' ? 'Get Directions' : 'Get Directions';

  const saveBtn = document.getElementById('btn-save');
  saveBtn.innerHTML = savedItems.has(item.id) ? '&#10003; Saved' : '&#9829; Save';

  // Show/hide remind button based on type
  document.getElementById('btn-remind').style.display = item.type === 'event' ? '' : 'none';

  // Similar events
  const similarScroll = document.getElementById('similar-scroll');
  const similar = EVENTS.filter(e => e.id !== item.id && (e.category === item.category || e.neighborhood === item.neighborhood)).slice(0, 6);
  similarScroll.innerHTML = similar.map(s => `
    <div class="similar-card" data-id="${s.id}">
      <div class="sim-img" style="background:${s.img};"></div>
      <div class="sim-info">
        <div class="sim-title">${s.title}</div>
        <div class="sim-meta">${s.venue} · ${s.price}</div>
      </div>
    </div>`).join('');

  similarScroll.querySelectorAll('.similar-card').forEach(card => {
    card.addEventListener('click', () => {
      const s = ALL_ITEMS.find(i => i.id === card.dataset.id);
      if (s) { map.flyTo([s.lat, s.lng], 15, { duration: 0.6 }); openDetail(s); }
    });
  });

  detailPanel.classList.add('open');
  map.flyTo([item.lat, item.lng], Math.max(map.getZoom(), 14), { duration: 0.8 });
}

function closeDetail() {
  detailPanel.classList.remove('open');
  currentDetail = null;
}

document.getElementById('detail-close').addEventListener('click', closeDetail);

// Save button
document.getElementById('btn-save').addEventListener('click', () => {
  if (!currentDetail) return;
  if (savedItems.has(currentDetail.id)) {
    savedItems.delete(currentDetail.id);
    document.getElementById('btn-save').innerHTML = '&#9829; Save';
  } else {
    savedItems.add(currentDetail.id);
    document.getElementById('btn-save').innerHTML = '&#10003; Saved';
  }
  updateSavedOverlay();
});

// Share button
document.getElementById('btn-share').addEventListener('click', () => {
  if (navigator.share && currentDetail) {
    navigator.share({ title: currentDetail.title, text: currentDetail.desc?.slice(0,100) + '...', url: window.location.href });
  }
});

// Remind button
document.getElementById('btn-remind').addEventListener('click', () => {
  if (currentDetail) alert(`Reminder set for "${currentDetail.title}" — you'll be notified 2 hours before.`);
});

// Tickets / Directions
document.getElementById('btn-tickets').addEventListener('click', () => {
  if (currentDetail) {
    if (currentDetail.type === 'bathroom' || currentDetail.type === 'attraction' || currentDetail.type === 'landmark') {
      window.open(`https://maps.apple.com/?daddr=${currentDetail.lat},${currentDetail.lng}`, '_blank');
    } else {
      alert('Opening ticketing page...');
    }
  }
});

// ─────────────────────────────────────────────
// HAPPENING NOW
// ─────────────────────────────────────────────
const happeningBtn = document.getElementById('btn-happening');
const happeningIndicator = document.getElementById('happening-indicator');

happeningBtn.addEventListener('click', () => {
  happeningNow = !happeningNow;
  happeningBtn.classList.toggle('active', happeningNow);
  happeningIndicator.classList.toggle('show', happeningNow);
  addMarkers();
});

// ─────────────────────────────────────────────
// FOR YOU
// ─────────────────────────────────────────────
const foryouBtn = document.getElementById('btn-foryou');
let forYouActive = false;
foryouBtn.addEventListener('click', () => {
  forYouActive = !forYouActive;
  foryouBtn.classList.toggle('active', forYouActive);
  if (forYouActive) {
    // Simulate "For You" by flying to a recommended area
    map.flyTo([40.7301, -74.0005], 14, { duration: 1 });
  }
});

// ─────────────────────────────────────────────
// RE-CENTER
// ─────────────────────────────────────────────
document.getElementById('btn-recenter').addEventListener('click', () => {
  map.flyTo([40.7128, -74.006], 12, { duration: 1 });
});

// ─────────────────────────────────────────────
// SEARCH
// ─────────────────────────────────────────────
const searchInput = document.getElementById('search-input');
const searchOverlay = document.getElementById('search-overlay');

searchInput.addEventListener('focus', () => {
  searchOverlay.classList.add('open');
  populateTrending();
  populateSearchCats();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    searchOverlay.classList.remove('open');
    searchInput.blur();
    closeDetail();
  }
});

function populateTrending() {
  const trending = EVENTS.filter(e => e.happeningNow).slice(0, 5);
  document.getElementById('trending-results').innerHTML = trending.map(item => `
    <div class="search-result" data-id="${item.id}">
      <div class="sr-dot" style="background:${colorForType(item.type)}"></div>
      <div>
        <div class="sr-title">${item.title}</div>
        <div class="sr-sub">${item.venue} · ${item.neighborhood}</div>
      </div>
    </div>`).join('');

  document.querySelectorAll('#trending-results .search-result').forEach(r => {
    r.addEventListener('click', () => {
      const item = ALL_ITEMS.find(i => i.id === r.dataset.id);
      if (item) {
        searchOverlay.classList.remove('open');
        searchInput.value = '';
        map.flyTo([item.lat, item.lng], 15, { duration: 0.8 });
        openDetail(item);
      }
    });
  });
}

function populateSearchCats() {
  const cats = ['Music','Food & Drink','Art & Culture','Comedy','Nightlife','Sports','Free'];
  document.getElementById('search-cats').innerHTML = cats.map(c =>
    `<button class="chip glass" style="font-size:12px;padding:6px 14px;" onclick="document.getElementById('search-overlay').classList.remove('open');document.querySelector('.chip[data-cat=\\'${c}\\']')?.click();">${c}</button>`
  ).join('');
}

// Live search
let searchTimeout;
searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    const q = searchInput.value.toLowerCase().trim();
    const resultsDiv = document.getElementById('search-results');
    const label = document.getElementById('search-results-label');

    if (!q) { resultsDiv.innerHTML = ''; label.style.display = 'none'; return; }
    label.style.display = 'block';

    const matches = ALL_ITEMS.filter(i =>
      i.title.toLowerCase().includes(q) ||
      (i.venue && i.venue.toLowerCase().includes(q)) ||
      (i.neighborhood && i.neighborhood.toLowerCase().includes(q)) ||
      (i.desc && i.desc.toLowerCase().includes(q)) ||
      (i.category && i.category.toLowerCase().includes(q))
    ).slice(0, 10);

    // Also search neighborhoods
    const nMatches = NEIGHBORHOODS.filter(n =>
      n.name.toLowerCase().includes(q) || n.vibes.some(v => v.toLowerCase().includes(q))
    );

    let html = matches.map(item => `
      <div class="search-result" data-id="${item.id}" data-type="item">
        <div class="sr-dot" style="background:${colorForType(item.type)}"></div>
        <div>
          <div class="sr-title">${item.title}</div>
          <div class="sr-sub">${item.type.charAt(0).toUpperCase()+item.type.slice(1)} · ${item.neighborhood || item.address}</div>
        </div>
      </div>`).join('');

    html += nMatches.map(n => `
      <div class="search-result" data-name="${n.name}" data-type="neighborhood">
        <div class="sr-dot" style="background:var(--purple)"></div>
        <div>
          <div class="sr-title">${n.name}</div>
          <div class="sr-sub">Neighborhood · ${n.vibes.join(', ')}</div>
        </div>
      </div>`).join('');

    resultsDiv.innerHTML = html || '<p style="padding:12px;color:var(--text-sec);font-size:14px;">No results found.</p>';

    resultsDiv.querySelectorAll('.search-result').forEach(r => {
      r.addEventListener('click', () => {
        searchOverlay.classList.remove('open');
        searchInput.value = '';
        if (r.dataset.type === 'item') {
          const item = ALL_ITEMS.find(i => i.id === r.dataset.id);
          if (item) { map.flyTo([item.lat, item.lng], 15, { duration: 0.8 }); openDetail(item); }
        } else {
          const n = NEIGHBORHOODS.find(n => n.name === r.dataset.name);
          if (n) {
            map.flyTo([n.lat, n.lng], 14, { duration: 0.8 });
            document.querySelector('.chip[data-cat="neighborhood"]')?.click();
          }
        }
      });
    });
  }, 300);
});

// Close search overlay when clicking outside
searchOverlay.addEventListener('click', e => {
  if (e.target === searchOverlay) {
    searchOverlay.classList.remove('open');
    searchInput.value = '';
  }
});

// ─────────────────────────────────────────────
// SAVED OVERLAY
// ─────────────────────────────────────────────
document.getElementById('saved-btn').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('saved-overlay').classList.add('open');
  updateSavedOverlay();
});

document.getElementById('saved-close').addEventListener('click', () => {
  document.getElementById('saved-overlay').classList.remove('open');
});

document.getElementById('saved-show-map').addEventListener('click', () => {
  document.getElementById('saved-overlay').classList.remove('open');
  // Highlight saved items — for prototype, just zoom to fit
  if (savedItems.size) {
    const saved = ALL_ITEMS.filter(i => savedItems.has(i.id));
    const group = L.featureGroup(saved.map(s => L.marker([s.lat, s.lng])));
    map.fitBounds(group.getBounds().pad(0.2));
  }
});

function updateSavedOverlay() {
  const list = document.getElementById('saved-list');
  if (savedItems.size === 0) {
    list.innerHTML = `<div class="saved-empty">
      <p style="font-size:40px;margin-bottom:12px;">&#128278;</p>
      <p style="font-size:16px;font-weight:500;color:var(--text);margin-bottom:4px;">No saved items yet</p>
      <p style="font-size:14px;color:var(--text-sec);">Tap the heart on any event to save it here.</p>
    </div>`;
    return;
  }
  const items = ALL_ITEMS.filter(i => savedItems.has(i.id));
  list.innerHTML = items.map(item => `
    <div class="sheet-card" data-id="${item.id}" style="border-left-color:${colorForType(item.type)}">
      <div class="thumb" style="background:${item.img || colorForType(item.type)};"></div>
      <div class="info">
        <div class="title">${item.title}</div>
        <div class="meta">${item.venue || item.address} · ${item.neighborhood || ''}</div>
        <span class="badge" style="background:${colorForType(item.type)}">${item.type === 'event' ? item.category : item.type}</span>
      </div>
    </div>`).join('');

  list.querySelectorAll('.sheet-card').forEach(card => {
    card.addEventListener('click', () => {
      const item = ALL_ITEMS.find(i => i.id === card.dataset.id);
      if (item) {
        document.getElementById('saved-overlay').classList.remove('open');
        map.flyTo([item.lat, item.lng], 15, { duration: 0.8 });
        openDetail(item);
      }
    });
  });
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
addMarkers();

// Close detail on map click (not on marker)
map.on('click', () => { if (detailPanel.classList.contains('open')) closeDetail(); });
</script>
</body>
</html>
